# Nixpacks config — build en la raiz del repo (sin rootDir).
# Con el codigo en la raiz, el package-lock.json esta en el contexto de build
# y npm ci funciona. Forzamos npm install por seguridad.
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "npm start"
